<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ahmed Mahmood — Portfolio</title>

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Ahmed Mahmood — Portfolio" />
<meta name="twitter:description" content="Full Stack Developer specializing in frontend, backend, database engineering, AI integration, and machine learning — delivering complete end-to-end digital solutions." />
<meta name="twitter:image" content="https://YOUR-DOMAIN.com/assets/preview.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;900&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ---------- Base ---------- */
  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    height: 100%;
    width: 100%;
    overflow-x: hidden;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* ---------- Stage ---------- */
  .stage {
    position: relative;
    min-height: 100vh;
    width: 100%;
    overflow: hidden;
    background: #050505;
  }

  /* ---------- Grid layer ---------- */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255, 255, 255, 0.045) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
    background-size: clamp(28px, 4.5vmin, 52px) clamp(28px, 4.5vmin, 52px);
    background-position: center center;
    z-index: 1;
    /* very gentle drift so it feels alive */
    animation: grid-drift 40s linear infinite;
  }

  @keyframes grid-drift {
    0%   { background-position: 0px 0px; }
    100% { background-position: 52px 52px; }
  }

  /* ---------- Corner red glows ---------- */
  .glow-tr,
  .glow-bl {
    position: absolute;
    /* Circle's center sits exactly at the corner,
       so only one quarter of the circle is visible on screen. */
    width: 55vmin;
    height: 55vmin;
    border-radius: 50%;
    background: radial-gradient(
      circle at center,
      rgba(255, 30, 55, 1) 0%,
      rgba(245, 18, 45, 0.92) 12%,
      rgba(225, 10, 38, 0.78) 24%,
      rgba(190, 5, 30, 0.6) 38%,
      rgba(140, 0, 22, 0.4) 54%,
      rgba(85, 0, 16, 0.22) 72%,
      rgba(35, 0, 8, 0.06) 88%,
      transparent 100%
    );
    filter: blur(15px);
    z-index: 2;
    pointer-events: none;
  }

  .glow-tr {
    top: -27.5vmin;
    right: -27.5vmin;
    animation: glow-pulse 6s ease-in-out infinite;
  }

  .glow-bl {
    bottom: -27.5vmin;
    left: -27.5vmin;
    animation: glow-pulse 7.5s ease-in-out infinite;
  }

  @keyframes glow-pulse {
    0%, 100% { opacity: 0.9; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.04); }
  }

  /* ---------- Vignette to deepen edges ---------- */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background: radial-gradient(
      ellipse at center,
      transparent 40%,
      rgba(0, 0, 0, 0.55) 100%
    );
  }

  /* ---------- Logo ---------- */
  .logo {
    position: absolute;
    top: clamp(16px, 2.8vmin, 32px);
    left: clamp(16px, 3vmin, 36px);
    z-index: 10;
    height: clamp(30px, 4.5vmin, 50px);
    width: auto;
    opacity: 0;
    transform: translateY(-8px);
    animation: logo-in 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    filter: drop-shadow(0 4px 18px rgba(255, 30, 30, 0.35));
  }

  @keyframes logo-in {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ---------- Glass Card ---------- */
  .card {
    position: absolute;
    top: 50%;
    left: 50%;
    /* Stays within width AND height. Aspect-ratio 4/5.2 = height/width 1.3, 
       so to fit vertically: max-width = (available height) / 1.3.
       82vw on narrow screens, 65vh on short screens, 560px cap on big ones. */
    width: min(82vw, 65vh, 560px);
    aspect-ratio: 4 / 5.2;
    border-radius: clamp(28px, 6vmin, 48px);
    z-index: 5;

    /* Clean dark glass — no red flood inside */
    background: linear-gradient(180deg, rgba(8, 3, 4, 0.78), rgba(2, 0, 1, 0.88));

    backdrop-filter: blur(14px) saturate(130%);
    -webkit-backdrop-filter: blur(14px) saturate(130%);

    /* Glowing red rim — concentrated on the edges, not inside */
    border: 1px solid rgba(255, 35, 55, 0.55);
    box-shadow:
      /* inner red rim (edge only — doesn't bleed into the body) */
      inset 0 0 32px rgba(255, 22, 42, 0.5),
      /* hairline on the inside edge for the lit-rim look */
      inset 0 0 0 1px rgba(255, 50, 70, 0.18),
      /* subtle glass highlight on top */
      inset 0 1px 1px rgba(255, 160, 175, 0.12),
      /* outer red halo — close */
      0 0 35px rgba(255, 20, 45, 0.35),
      /* outer red halo — wide, soft */
      0 0 95px rgba(255, 15, 40, 0.22),
      /* ambient drop for depth */
      0 40px 90px rgba(0, 0, 0, 0.6);

    opacity: 0;
    transform: translate(-50%, -50%) scale(0.96);
    animation: card-in 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
  }

  /* JUST a slightly brighter glow along the top edge — does NOT flood inside */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: radial-gradient(
      ellipse 80% 14% at 50% 0%,
      rgba(255, 40, 60, 0.45) 0%,
      rgba(255, 25, 50, 0.15) 45%,
      transparent 100%
    );
    mix-blend-mode: screen;
  }

  /* Soft sheen sweeping diagonally for the "liquid glass" hint */
  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.06) 0%,
      rgba(255, 255, 255, 0) 30%,
      rgba(255, 255, 255, 0) 70%,
      rgba(255, 200, 210, 0.04) 100%
    );
  }

  @keyframes card-in {
    to {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  }

  /* ---------- Portrait (me.png) ---------- */
  .portrait {
    position: absolute;
    top: -14%;
    left: 50%;
    width: 42%;
    max-width: 230px;
    z-index: 6;
    opacity: 0;
    transform: translateX(-50%) translateY(-18px);
    animation: portrait-in 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
    pointer-events: none;
    filter: drop-shadow(0 18px 30px rgba(255, 20, 40, 0.35))
            drop-shadow(0 4px 10px rgba(0, 0, 0, 0.6));
  }

  .portrait img {
    width: 100%;
    height: auto;
    display: block;
    animation: portrait-float 6s ease-in-out 2.4s infinite;
  }

  @keyframes portrait-in {
    to {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  }

  @keyframes portrait-float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  /* ---------- Card text content ---------- */
  .card-content {
    position: absolute;
    top: 30%;
    left: 8%;
    right: 8%;
    z-index: 6;
    color: #fff;
  }

  .hello-im {
    font-family: "Outfit", sans-serif;
    font-weight: 500;
    font-size: clamp(17px, 3.0vmin, 30px);
    letter-spacing: 0.32em;
    margin: 0 0.20em 0.45em;
    color: #f4f4f4;

    opacity: 0;
    transform: translateY(12px);
    animation: text-fade-up 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.0s forwards;
  }

  .name {
    font-family: "Outfit", sans-serif;
    font-weight: 900;
    font-size: clamp(26px, 4.6vmin, 46px);
    letter-spacing: 0.04em;
    line-height: 1;
    margin: 0 0 0.35em;
    color: #ff3550;
    text-shadow:
      0 0 22px rgba(255, 30, 50, 0.55),
      0 0 50px rgba(255, 20, 45, 0.35);

    opacity: 0;
    transform: translateY(14px);
    animation: text-fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.15s forwards;
  }

  .role {
    font-family: "Quicksand", sans-serif;
    font-weight: 500;
    font-size: clamp(15px, 2.5vmin, 25px);
    letter-spacing: 0.01em;
    color: #ededed;
    margin: 0 0 8%;

    opacity: 0;
    transform: translateY(12px);
    animation: text-fade-up 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.3s forwards;
  }

  .description {
    border-left: 2px solid rgba(255, 35, 55, 0.85);
    padding-left: clamp(12px, 1.6vmin, 18px);

    opacity: 0;
    transform: translateY(12px);
    animation: text-fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.5s forwards;
  }

  .description p {
    font-family: "Inter", -apple-system, sans-serif;
    font-weight: 400;
    font-size: clamp(12px, 1.7vmin, 16.5px);
    line-height: 1.55;
    color: rgba(245, 245, 245, 0.92);
    margin: 0;
  }

  @keyframes text-fade-up {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ---------- "See my works" pill button (centered inside card, bottom) ---------- */
  .btn-works {
    position: absolute;
    bottom: 7%;
    left: 50%;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: clamp(10px, 1.6vmin, 14px) clamp(20px, 3vmin, 28px);
    border: 1.5px solid rgba(255, 40, 60, 0.6);
    border-radius: 999px;
    background: rgba(255, 25, 45, 0.04);
    color: #ff3550;
    text-decoration: none;
    font-weight: 700;
    font-size: clamp(12px, 1.5vmin, 14.5px);
    letter-spacing: 0.4px;
    white-space: nowrap;
    cursor: pointer;
    z-index: 7;
    overflow: hidden;
    transition:
      transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
      background 0.4s ease,
      border-color 0.4s ease,
      box-shadow 0.45s ease,
      color 0.4s ease;
    opacity: 0;
    transform: translateX(-50%) translateY(10px);
    animation: btn-fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.75s forwards;
  }

  /* shimmer that sweeps across on hover */
  .btn-works::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      120deg,
      transparent 0%,
      rgba(255, 60, 80, 0.28) 50%,
      transparent 100%
    );
    transform: translateX(-110%);
    transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
  }

  .btn-works:hover {
    background: rgba(255, 30, 50, 0.1);
    border-color: rgba(255, 65, 85, 0.9);
    transform: translateX(-50%) translateY(-3px);
    box-shadow:
      0 8px 30px rgba(255, 25, 50, 0.4),
      inset 0 0 20px rgba(255, 25, 50, 0.15);
    color: #ff6a82;
  }

  .btn-works:hover::before {
    transform: translateX(110%);
  }

  .btn-works:active {
    transform: translateX(-50%) translateY(-1px) scale(0.97);
  }

  .btn-works-label,
  .btn-icon-code {
    position: relative;
    z-index: 1;
  }

  .btn-icon-code {
    font-family: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
    font-weight: 700;
    font-size: 0.95em;
    letter-spacing: -1px;
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .btn-works:hover .btn-icon-code {
    transform: rotate(8deg) scale(1.15);
  }

  @keyframes btn-fade-up {
    to {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  }

  /* ---------- Arrow circle button (outside card, bottom-right of screen) ---------- */
  .btn-arrow {
    position: absolute;
    bottom: clamp(24px, 4.5vmin, 48px);
    right: clamp(24px, 4.5vmin, 48px);
    width: clamp(46px, 6.5vmin, 60px);
    height: clamp(46px, 6.5vmin, 60px);
    border-radius: 50%;
    border: 1.5px solid rgba(255, 40, 60, 0.6);
    background: rgba(255, 25, 45, 0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ff3550;
    text-decoration: none;
    cursor: pointer;
    z-index: 8;
    transition:
      transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
      background 0.4s ease,
      border-color 0.4s ease,
      box-shadow 0.5s ease,
      color 0.4s ease;
    opacity: 0;
    transform: scale(0.7) rotate(-90deg);
    animation: arrow-fade-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.95s forwards,
               arrow-pulse 3.2s ease-in-out 3.2s infinite;
  }

  .btn-arrow:hover {
    background: rgba(255, 30, 50, 0.12);
    border-color: rgba(255, 70, 90, 0.95);
    transform: scale(1.12);
    box-shadow:
      0 0 40px rgba(255, 25, 50, 0.5),
      inset 0 0 18px rgba(255, 25, 50, 0.18);
    color: #ff6a82;
    animation-play-state: paused;
  }

  .btn-arrow:active {
    transform: scale(1.03);
  }

  .btn-arrow svg {
    width: 45%;
    height: 45%;
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .btn-arrow:hover svg {
    transform: translateX(4px);
  }

  @keyframes arrow-fade-in {
    to {
      opacity: 1;
      transform: scale(1) rotate(0);
    }
  }

  /* gentle idle pulse so the arrow feels alive */
  @keyframes arrow-pulse {
    0%, 100% {
      box-shadow: 0 0 0 rgba(255, 25, 50, 0);
    }
    50% {
      box-shadow: 0 0 24px rgba(255, 25, 50, 0.35);
    }
  }

  /* ---------- Page transition (smooth fade + scale, not instant) ---------- */
  body {
    transition: opacity 0.55s cubic-bezier(0.7, 0, 0.84, 0);
  }

  body.leaving {
    opacity: 0;
  }

  body.leaving .stage {
    transform: scale(0.96);
    transition: transform 0.55s cubic-bezier(0.7, 0, 0.84, 0);
  }

  /* pulse on the clicked button before navigating away */
  .btn-pulsing {
    transform: scale(1.1) !important;
    box-shadow:
      0 0 80px rgba(255, 30, 50, 0.7),
      inset 0 0 25px rgba(255, 25, 50, 0.3) !important;
    transition: transform 0.25s ease, box-shadow 0.25s ease !important;
  }

  /* keep the centered btn-works centered during its click pulse */
  .btn-works.btn-pulsing {
    transform: translateX(-50%) scale(1.1) !important;
  }

  /* ---------- Page indicator (centered, same row as arrow button) ---------- */
  .page-indicator {
    position: absolute;
    bottom: clamp(24px, 4.5vmin, 48px);
    left: 50%;
    height: clamp(46px, 6.5vmin, 60px); /* matches arrow button height for true alignment */
    display: flex;
    align-items: center;
    gap: clamp(8px, 1.2vmin, 14px);
    z-index: 8;
    font-family: "Outfit", sans-serif;
    pointer-events: none;
    user-select: none;

    opacity: 0;
    transform: translateX(-50%) translateY(10px);
    animation: indicator-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) 2.1s forwards;
  }

  .page-indicator .current {
    font-size: clamp(22px, 3.4vmin, 36px);
    font-weight: 900;
    line-height: 1;
    color: #ff3550;
    letter-spacing: 0.02em;
    text-shadow:
      0 0 18px rgba(255, 30, 50, 0.55),
      0 0 40px rgba(255, 20, 45, 0.3);
    animation: indicator-glow 3s ease-in-out 2.6s infinite;
  }

  .page-indicator .divider {
    display: inline-block;
    width: clamp(14px, 2vmin, 22px);
    height: 1.5px;
    background: linear-gradient(
      90deg,
      rgba(255, 50, 70, 0.85) 0%,
      rgba(255, 50, 70, 0.25) 100%
    );
    border-radius: 2px;
  }

  .page-indicator .total {
    font-size: clamp(14px, 2.1vmin, 22px);
    font-weight: 500;
    line-height: 1;
    color: rgba(255, 255, 255, 0.45);
    letter-spacing: 0.05em;
  }

  @keyframes indicator-in {
    to {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  }

  /* subtle pulse on the current number — feels alive */
  @keyframes indicator-glow {
    0%, 100% {
      text-shadow:
        0 0 18px rgba(255, 30, 50, 0.55),
        0 0 40px rgba(255, 20, 45, 0.3);
    }
    50% {
      text-shadow:
        0 0 28px rgba(255, 40, 65, 0.8),
        0 0 60px rgba(255, 25, 50, 0.45);
    }
  }

  /* ---------- Responsive ---------- */

  /* Small phones (e.g. iPhone SE) */
  @media (max-width: 380px) {
    .card {
      width: min(90vw, 65vh);
    }
    .portrait {
      width: 46%;
      top: -11%;
    }
  }

  /* Standard mobile portrait */
  @media (max-width: 640px) {
    .card {
      width: min(88vw, 65vh);
    }
    .portrait {
      top: -12%;
      width: 44%;
    }
  }

  /* Tablets — keep card moderate so it doesn't dominate */
  @media (min-width: 641px) and (max-width: 1024px) {
    .card {
      width: min(60vw, 70vh, 540px);
    }
  }

  /* Landscape phones / very short viewports — height is the bottleneck */
  @media (max-height: 520px) and (orientation: landscape) {
    .card {
      width: min(40vw, 75vh);
      border-radius: clamp(22px, 5vmin, 36px);
    }
    .portrait {
      top: -16%;
      width: 38%;
    }
    .logo {
      height: clamp(26px, 5vmin, 36px);
    }
  }

  /* Respect users who prefer reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .logo,
    .card,
    .portrait {
      opacity: 1 !important;
      transform: translate(-50%, -50%) !important;
    }
    .logo {
      transform: none !important;
    }
    .portrait {
      transform: translateX(-50%) !important;
    }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="grid"></div>
    <div class="glow-tr"></div>
    <div class="glow-bl"></div>
    <div class="vignette"></div>

    <img src="assets/logo.png" alt="ZT Labs" class="logo" />

    <div class="card">
      <div class="portrait">
        <img src="assets/me.png" alt="Ahmed Mahmood" />
      </div>

      <div class="card-content">
        <h1 class="hello-im">HELLO I'M</h1>
        <h2 class="name">AHMED MAHMOOD</h2>
        <p class="role">Full stack &ndash; Ai &ndash; Machine Learning</p>
        <div class="description">
          <p>Experienced Full Stack Developer with expertise in frontend development, backend systems, database engineering, AI integration, and machine learning applications &mdash; delivering complete end-to-end digital solutions.</p>
        </div>
      </div>

      <a href="work.html" class="btn-works" data-transition>
        <span class="btn-works-label">See my works</span>
        <span class="btn-icon-code" aria-hidden="true">&lt;/&gt;</span>
      </a>
    </div>

    <a href="skill.html" class="btn-arrow" data-transition aria-label="Go to skills">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </a>

    <div class="page-indicator" aria-label="Page 1 of 5">
      <span class="current">01</span>
      <span class="divider" aria-hidden="true"></span>
      <span class="total">05</span>
    </div>
  </div>

  <script>
    document.querySelectorAll('[data-transition]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const href = link.getAttribute('href');
        link.classList.add('btn-pulsing');
        setTimeout(() => document.body.classList.add('leaving'), 180);
        setTimeout(() => { window.location.href = href; }, 640);
      });
    });
  </script>
</body>
</html>
